  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --orange: #f66c28;
      --blue: #3498db;
    }

    body {
      background: var(--bg);
      display: flex;
      font-family: "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      /* ブラウザのデフォルトズームを防止 */
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    #map-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg);
      position: relative;
    }

    #zoom-controls {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 500;
      pointer-events: auto;
    }

    .zoom-btn {
      width: 60px;
      height: 60px;
      background: white;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .zoom-btn:active {
      transform: scale(0.9);
      background-color: #f0f0f0;
    }

    svg#campus-svg {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
    }

    .building-path {
      cursor: pointer;
      transition: fill 0.2s;
    }

    .building-path:hover {
      filter: brightness(1.1);
      stroke: #333;
      stroke-width: 1px;
    }

    .facility-marker {
      cursor: pointer;
      transition: fill 0.2s;
    }

    .facility-marker:hover {
      filter: brightness(1.1);
      stroke: #333;
      stroke-width: 1px;
    }

    .building-label {
      font-size: 14px;
      /* 約2倍 (元13.2px) */
      font-weight: bold;
      fill: #fff;
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: central;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.3);
      stroke-width: 3px;
    }


    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 25vh;
      /* 少し高さを増やして大きな文字に対応 */
      background-color: transparent;
      pointer-events: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background-color: #fff;
      padding: 40px 30px 50px 30px;
      border: none;
      width: 100%;
      height: 100%;
      max-width: none;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      position: relative;
      box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.15);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: auto;
    }

    .modal.show .modal-content {
      transform: translateY(0);
    }

    /* モーダルの上のつまみ棒 */
    .modal-content::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 6px;
      background-color: #e0e0e0;
      border-radius: 3px;
    }

    .close {
      color: #aaa;
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 40px;
      /* さらに大きく */
      font-weight: bold;
      cursor: pointer;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close:hover {
      color: #333;
    }

    #modal-title {
      margin-top: 0;
      color: #333;
      font-size: 24px;
      /* 約2倍 (元24px付近) */
      font-weight: bold;
    }

    #modal-description {
      color: #333;
      font-size: 18px;
      /* 約2倍 (元14-18px) */
      margin-top: 25px;
      line-height: 1.4;
    }

    #disclaimer-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      padding: 12px 15px;
      font-size: 12px;
      line-height: 1.5;
      color: #777;
      border-bottom: 1px solid #eee;
      z-index: 2000;
      text-align: center;
      pointer-events: none;
    }
  </style>

      let scale = 1;
      let pointX = 0;
      let pointY = 0;
      let startX = 0;
      let startY = 0;
      let isPanning = false;
      let lastDist = 0; // ピンチズーム用

      function updateTransform() {
        viewport.setAttribute("transform", `translate(${pointX}, ${pointY}) scale(${scale})`);
      }

      function zoom(delta, centerX, centerY) {
        const zoomSpeed = 0.1;
        const newScale = delta > 0 ? scale * (1 + zoomSpeed) : scale / (1 + zoomSpeed);

        if (newScale < 0.5 || newScale > 10) return;

        // 指定座標を中心にズーム
        pointX = centerX - (centerX - pointX) * (newScale / scale);
        pointY = centerY - (centerY - pointY) * (newScale / scale);
        scale = newScale;

        updateTransform();
      }

      // ブラウザ標準のズーム（Ctrl+ホイール）を防止
      window.addEventListener("wheel", (e) => {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });

      // --- PC操作（マウス） ---
      svg.addEventListener("mousedown", function (e) {
        if (e.button !== 0) return; // 左クリックのみ
        isPanning = true;
        startX = e.clientX - pointX;
        startY = e.clientY - pointY;
        svg.style.cursor = "grabbing";
      });

      window.addEventListener("mousemove", function (e) {
        if (!isPanning) return;
        pointX = e.clientX - startX;
        pointY = e.clientY - startY;
        updateTransform();
      });

      window.addEventListener("mouseup", function () {
        isPanning = false;
        svg.style.cursor = "default";
      });

      // マウスホイールによるズーム
      svg.addEventListener("wheel", function (e) {
        e.preventDefault();
        const rect = svg.getBoundingClientRect();
        const centerX = e.clientX - rect.left;
        const centerY = e.clientY - rect.top;
        zoom(e.deltaY < 0 ? 1 : -1, centerX, centerY);
      }, { passive: false });

      svg.style.touchAction = "none";

      // タッチ対応（パン＆ピンチズーム）
      svg.addEventListener("touchstart", function (e) {
        if (e.touches.length === 1) {
          isPanning = true;
          startX = e.touches[0].clientX - pointX;
          startY = e.touches[0].clientY - pointY;
        } else if (e.touches.length === 2) {
          isPanning = false;
          lastDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        }
      }, { passive: false });

      svg.addEventListener("touchmove", function (e) {
        e.preventDefault(); // ブラウザ標準のスクロール・ズームを防止
        const rect = svg.getBoundingClientRect();

        if (e.touches.length === 1 && isPanning) {
          pointX = e.touches[0].clientX - startX;
          pointY = e.touches[0].clientY - startY;
          updateTransform();
        } else if (e.touches.length === 2) {
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
          const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

          if (lastDist > 0) {
            const ratio = dist / lastDist;
            const newScale = scale * ratio;

            if (newScale >= 0.5 && newScale <= 10) {
              pointX = centerX - (centerX - pointX) * (newScale / scale);
              pointY = centerY - (centerY - pointY) * (newScale / scale);
              scale = newScale;
              updateTransform();
            }
          }
          lastDist = dist;
        }
      }, { passive: false });

        if (e.touches.length === 0) {
          isPanning = false;
        } else if (e.touches.length === 1) {
          isPanning = true;
          startX = e.touches[0].clientX - pointX;
          startY = e.touches[0].clientY - pointY;
